# Databricks Apps manifest.
#
# This file declares the start command for the app. Environment variables
# and resource bindings (SQL Warehouse, catalog/schema names) are supplied
# by the Databricks Asset Bundle (`databricks.yml`) at deploy time — see
# the `resources.apps.dashboard` block there.
#
# Docs: https://docs.databricks.com/aws/dev-tools/databricks-apps/configuration

# Databricks Apps injects DATABRICKS_APP_PORT at runtime; app/config.py
# picks it up in preference to DASHBOARD_PORT.
command:
  - python
  - -m
  - app.main
